<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ludo-pitara/favicon.svg" />
    <!-- Pinch-zoom is intentionally allowed: blocking it (with
         maximum-scale=1 / user-scalable=no) is a hard accessibility
         failure for low-vision users. The CSS already pins the
         playable layout and `touch-action: manipulation` on `*`
         disables double-tap-to-zoom, so user zoom is a deliberate
         gesture only. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Play Ludo & Snake and Ladders offline with friends! A beautiful PWA board game app." />
    <meta name="theme-color" content="#190a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ludo Pitara" />
    <link rel="apple-touch-icon" sizes="180x180" href="/ludo-pitara/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Ludo Pitara — Play Ludo & Snake and Ladders</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
